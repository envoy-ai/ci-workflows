name: Reusable Staging Promotion

# Opens (or updates) a PR promoting `head-branch` into `base-branch` on a
# schedule. Used to nudge development → staging daily so changes don't
# pile up between releases.
#
# `peter-evans/create-pull-request` dedupes by (base, head), so if a PR
# is already open for the same pair (e.g. one opened by release-please)
# this would clobber its title/body. To prevent that, the workflow can
# skip when an existing PR's title starts with `skip-if-title-prefix`.

on:
  workflow_call:
    inputs:
      head-branch:
        description: "Branch to promote from"
        required: false
        type: string
        default: development
      base-branch:
        description: "Branch to promote into"
        required: false
        type: string
        default: staging
      title:
        description: "Title for the promotion PR"
        required: false
        type: string
        default: "chore: promote development to staging"
      body:
        description: "Body for the promotion PR"
        required: false
        type: string
        default: |
          Automated daily promotion of `development` → `staging`.
      labels:
        description: "Comma-separated labels to apply to the PR"
        required: false
        type: string
        default: "automated,staging-promotion"
      skip-if-title-prefix:
        description: >-
          If an open PR exists with the same (base, head) and a title starting
          with this prefix, skip opening/updating the promotion PR. Set empty
          to disable the check.
        required: false
        type: string
        default: "release:"

permissions:
  contents: write
  pull-requests: write

jobs:
  open-promotion-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      # Validate branch inputs before passing to git/gh. Refnames in this
      # workflow are controlled by callers, but pinning the allowed alphabet
      # to standard git refname characters rules out flag-injection or
      # shell-metacharacter surprises if a future caller forwards an
      # untrusted value.
      - name: Validate branch inputs
        env:
          BASE: ${{ inputs.base-branch }}
          HEAD: ${{ inputs.head-branch }}
        run: |
          pattern='^[A-Za-z0-9._/-]+$'
          if [[ ! "$BASE" =~ $pattern ]]; then
            echo "::error::base-branch contains disallowed characters: $BASE"
            exit 1
          fi
          if [[ ! "$HEAD" =~ $pattern ]]; then
            echo "::error::head-branch contains disallowed characters: $HEAD"
            exit 1
          fi

      # Skip when a release-please (or other) PR has already been opened
      # for the same head→base, so we don't clobber its title/body.
      - name: Check for existing PR matching skip prefix
        id: check
        if: inputs.skip-if-title-prefix != ''
        env:
          GH_TOKEN: ${{ github.token }}
          PREFIX: ${{ inputs.skip-if-title-prefix }}
          BASE: ${{ inputs.base-branch }}
          HEAD: ${{ inputs.head-branch }}
        run: |
          existing=$(gh pr list \
            --base "$BASE" \
            --head "$HEAD" \
            --state open \
            --json title \
            | jq -r --arg prefix "$PREFIX" \
              '.[] | select(.title | startswith($prefix)) | .title' \
            | head -n1)
          if [ -n "$existing" ]; then
            echo "Found PR matching prefix '$PREFIX': $existing — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open promotion PR
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          BASE: ${{ inputs.base-branch }}
          HEAD: ${{ inputs.head-branch }}
          TITLE: ${{ inputs.title }}
          BODY: ${{ inputs.body }}
          LABELS: ${{ inputs.labels }}
        run: |
          ahead=$(git rev-list --count "origin/${BASE}..origin/${HEAD}")
          if [ "$ahead" -eq 0 ]; then
            echo "No commits on ${HEAD} ahead of ${BASE} — nothing to promote."
            exit 0
          fi

          existing=$(gh pr list --base "$BASE" --head "$HEAD" --state open --json number --jq '.[0].number')
          if [ -n "$existing" ]; then
            echo "PR #${existing} already open for ${HEAD} → ${BASE} — leaving it alone."
            exit 0
          fi

          gh pr create \
            --base "$BASE" \
            --head "$HEAD" \
            --title "$TITLE" \
            --body "$BODY" \
            --label "$LABELS"
