name: "Claude Implement Ticket"
description: >-
  Shared tail for the Linear → Claude pipeline: runs claude-code-action to
  implement a ticket end-to-end against repo-specific quality gates, resolves
  the opened PR, and posts a Slack notification. Toolchain setup (checkout +
  language/deps) is the CALLER's responsibility and MUST run before this action,
  because each consumer repo's setup diverges (poetry vs npm/wxt) and a composite
  action runs inside the caller's already-prepared job.

inputs:
  # Ticket context (forwarded from repository_dispatch client_payload /
  # workflow_dispatch inputs by the caller).
  ticket_id:
    description: "Linear issue id (UUID)"
    required: false
    default: ""
  identifier:
    description: "Human ticket identifier, e.g. ENG-123"
    required: true
  title:
    description: "Ticket title"
    required: true
  description:
    description: "Ticket description (markdown)"
    required: false
    default: ""
  url:
    description: "Linear ticket URL"
    required: false
    default: ""

  # Repo-specific knobs.
  base_branch:
    description: "Branch to base the PR on"
    required: true
  branch_prefix:
    description: "Prefix for the work branch"
    required: false
    default: "claude/"
  gate_commands:
    description: "Multiline list of the quality-gate commands Claude must pass before opening the PR"
    required: true
  allowed_tools:
    description: "claude-code-action --allowedTools value"
    required: true
  model:
    description: "Model for claude-code-action"
    required: false
    default: "claude-sonnet-5"
  max_turns:
    description: "claude-code-action --max-turns"
    required: false
    default: "50"

  # Secrets — composite actions cannot read `secrets:`, so the caller passes them
  # in from `${{ secrets.* }}`. They live in the consumer repos, not here.
  anthropic_api_key:
    description: "Anthropic API key the action bills to"
    required: true
  gh_token:
    description: "GitHub token (App/PAT) for checkout, gh pr create, and triggering downstream CI"
    required: true
  slack_webhook_url:
    description: "Slack incoming-webhook URL for #claude-tickets"
    required: true

runs:
  using: composite
  steps:
    - name: Implement ticket with Claude Code
      uses: anthropics/claude-code-action@v1
      env:
        # The `gh` CLI Claude invokes reads GH_TOKEN; using the App/PAT (not the
        # default GITHUB_TOKEN) is what makes the opened PR trigger downstream CI.
        GH_TOKEN: ${{ inputs.gh_token }}
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        github_token: ${{ inputs.gh_token }}
        # SECURITY MODEL — allowedTools is NOT a sandbox. The agent runs the repo's
        # test/build suite (Bash(poetry run|npm|npx):*) on attacker-influenceable
        # ticket text = effective ARBITRARY CODE EXECUTION: a granted interpreter can
        # shell out past the allowlist (including `git push`). Do not rely on
        # allowedTools for safety. The real boundary is ENVIRONMENTAL, enforced by the
        # caller workflow + GitHub: egress block (harden-runner, first job step), a
        # ~1h single-repo Contents+PRs-only App token, all-dummy decrypted test
        # secrets, and branch protection on `development` (no direct push / no bypass
        # actor). use_commit_signing routes commits via the GitHub MCP file-ops tool —
        # a provenance choice, NOT a containment guarantee.
        use_commit_signing: true
        branch_prefix: ${{ inputs.branch_prefix }}
        claude_args: |
          --max-turns ${{ inputs.max_turns }}
          --model ${{ inputs.model }}
          --allowedTools "${{ inputs.allowed_tools }}"
        prompt: |
          <role>
          You are a senior staff software engineer. You implement a Linear ticket end-to-end in this repository, then open a pull request for human review. You work autonomously to an enterprise-grade bar: correct, minimal, fully tested, and indistinguishable from the surrounding code. Your turn budget is limited — work efficiently, batch independent tool calls, and do not over-explore.
          </role>

          <ticket id="${{ inputs.identifier }}">
          Title: ${{ inputs.title }}
          Linear: ${{ inputs.url }}
          Description:
          ${{ inputs.description }}
          </ticket>

          <workflow>
          Work in this order:
          1. ORIENT (briefly): read the root CLAUDE.md and any nested CLAUDE.md in the directories you will touch. Locate the existing code, utilities, and tests most relevant to this ticket and read just enough to match how this codebase already does things. Prefer targeted search over broad reading.
          2. PLAN (to yourself, briefly): decide the smallest change that fully satisfies the ticket by reusing existing patterns and utilities. Do not write a separate plan document.
          3. IMPLEMENT: make the change; add or extend tests that cover it.
          4. VERIFY: run the quality gates and iterate until they ALL pass. Treat actual command output as the only evidence — never assume a gate passed.
          5. OPEN THE PR — only if everything passes.
          </workflow>

          <engineering_standards>
          Follow DRY, senior-level, enterprise-grade engineering standards. Match the patterns, naming, structure, typing, error-handling, and syntax already used throughout this codebase as closely and intelligently as possible — your diff should look like a teammate wrote it. Reuse existing utilities, services, and abstractions; do NOT reinvent anything the codebase already provides. Make the smallest change that fully and correctly satisfies the ticket: no unrelated refactors, no scope creep, no speculative abstraction.
          </engineering_standards>

          <definition_of_done>
          - Everything you implement is done FULLY — no stubs, TODOs, or placeholder no-ops on the load-bearing path. (A part that genuinely needs human clarification is left out and documented per <ambiguity_and_scope>, never stubbed.)
          - New or updated tests cover the change.
          - Every quality gate passes locally, verified from command output.
          - The change reuses existing code where applicable and is consistent with existing conventions.
          </definition_of_done>

          <quality_gates>
          Loop until ALL of these pass BEFORE opening the PR:
          ${{ inputs.gate_commands }}
          You MUST add or extend tests covering your change, then iterate until every gate above passes.
          </quality_gates>

          <pull_request>
          - The workflow commits and pushes your changes to a work branch for you. Do NOT run git yourself, and never push to ${{ inputs.base_branch }} or any branch other than your own work branch. Never merge.
          - Open the PR against ${{ inputs.base_branch }} with `gh pr create`.
          - PR TITLE: Conventional Commits, and it MUST contain the ticket id — e.g. `feat(scope): concise summary (${{ inputs.identifier }})`.
          - PR BODY: what changed and why, how you verified it (name the gates you ran), and a link to the Linear ticket: ${{ inputs.url }}.
          - Include this trailer on its own line: Co-Authored-By: Claude <noreply@anthropic.com>
          </pull_request>

          <ambiguity_and_scope>
          Resolve unclear scope yourself FIRST by following existing precedent: if the codebase already shows how something like this is done (an existing pattern, utility, similar feature, or convention), follow it — that is the answer, not ambiguity. Do not ask for clarification on anything the codebase already settles.

          When a specific part of the ticket genuinely needs a human/product decision that the codebase does NOT settle:
          - Implement every part that IS clear, fully and with tests, and get all gates green.
          - Do NOT guess, stub, or no-op the unclear part — leave it out.
          - Still open the PR, and add a "## Open questions / needs clarification" section to the PR body stating exactly what is unresolved, the options you considered, and what input you need to finish it.

          Decline entirely (do NOT open a PR; explain in your final message) only if: the whole ticket is not an actionable engineering/code task, you cannot get the gates to pass, or it cannot be implemented safely.
          </ambiguity_and_scope>

    # Resolve by ticket id in the PR title (the prompt requires it there), not by a
    # hand-picked branch name — so it works regardless of how the action names the
    # work branch. gh runs against this repo, so the search is implicitly repo-scoped.
    - name: Resolve opened PR URL
      id: pr
      if: always()
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        IDENTIFIER: ${{ inputs.identifier }}
      run: |
        url="$(gh pr list --search "${IDENTIFIER} in:title state:open" --json url --jq '.[0].url' 2>/dev/null || true)"
        echo "url=${url}" >> "$GITHUB_OUTPUT"

    # Build the message in shell (safe var interpolation), then hand it to Slack via
    # toJSON so any quotes/newlines in the values can't corrupt the JSON payload.
    - name: Compose Slack message
      id: msg
      if: always()
      shell: bash
      env:
        PR_URL: ${{ steps.pr.outputs.url }}
        TICKET_URL: ${{ inputs.url }}
        IDENTIFIER: ${{ inputs.identifier }}
        REPO: ${{ github.repository }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        if [ -n "$PR_URL" ]; then
          text=":robot_face: Claude opened a PR for <${TICKET_URL}|${IDENTIFIER}> in ${REPO}: ${PR_URL}"
        else
          text=":warning: Claude run for <${TICKET_URL}|${IDENTIFIER}> in ${REPO} finished without a PR — <${RUN_URL}|see run>"
        fi
        {
          echo "text<<__SLACK_EOF__"
          echo "$text"
          echo "__SLACK_EOF__"
        } >> "$GITHUB_OUTPUT"

    - name: "Notify #claude-tickets"
      if: always()
      uses: slackapi/slack-github-action@v2
      with:
        webhook: ${{ inputs.slack_webhook_url }}
        webhook-type: incoming-webhook
        payload: |
          { "text": ${{ toJSON(steps.msg.outputs.text) }} }
